<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Pawzy</title>
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>
<div class="profile-container">
    <header class="profile-header">
        <img id="userAvatar" src="img/3.jpg" alt="Avatar">
        <h1 id="userName">Usuario</h1>
        <p id="userEmail">Correo electrónico</p>
        <button id="logoutButton">Cerrar Sesión</button>
    </header>

    <section class="upload-section">
        <!-- Caja de subida de archivo -->
        <div class="upload-box">
            <label for="fileInput">
                <i class="fas fa-upload"></i>
                <p>Elige un archivo o arrástralo y suéltalo aquí</p>
                <p>Se recomienda usar archivos .jpg de alta calidad que tengan menos de 20 MB</p>
            </label>
            <input type="file" id="fileInput">
        </div>
    
        <!-- Área de descripción -->
        <div class="description-container">
            <h3>Título</h3>
            <input type="text" id="titleInput" placeholder="Añade un título">
            
            <h3>Descripción</h3>
            <textarea id="descriptionInput" placeholder="Añade una descripción detallada"></textarea>
    
            <button id="uploadButton">Publicar</button>
        </div>
    </section>
    
    <section class="posts-section">
        <h2>Mis Publicaciones</h2>
        <div id="userPosts" class="post-gallery"></div>
    </section>
    
</div>

<script src="js/profile.js"></script>
</body>
</html>
