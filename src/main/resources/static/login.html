<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Pawzy</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <header class="header d-flex justify-content-between align-items-center">
    <div class="logo d-flex align-items-center">
        <img src="img/animals.png" href="index.html" alt="Logo" class="logo-img" >
        <img src="img/letraLogo.png" alt="Logo" class="logo-img">
    </div>
    <nav class="nav">
        <button class="menu-toggle d-md-none" onclick="toggleMenu()">☰</button>
        <div class="desktop-nav d-none d-md-flex">
            <a href="register.html" class="nav-button nav-button--outline">Registrarse</a>
        </div>
    </nav>
  </header>

  <div class="login-container">
    <div class="logo-container">
      <img src="img/pawzyLogo.png" class="img-logo" alt="Logo">
    </div>
    <h2>Iniciar Sesión</h2>
    <form id="loginForm">
      <label>Correo Electrónico</label>
      <input type="email" id="email" placeholder="Tu correo" required>

      <label>Contraseña</label>
      <input type="password" id="password" placeholder="Tu contraseña" required>

      <button type="submit">Ingresar</button>
    </form>
    <p id="message"></p>
    <p>¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
  </div>

  <script src="js/auth.js"></script>
  <script>
    function toggleMenu() {
      const menu = document.querySelector('.menu');
      menu.classList.toggle('show');
    }
  </script>
</body>
</html>
