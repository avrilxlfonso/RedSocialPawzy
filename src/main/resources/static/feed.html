<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawzy - Feed</title>
    <link rel="stylesheet" href="css/feed.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="icon" type="image/png" href="img/pawzylogo.png">
</head>
<body class="feed-body">
    <div class="feed-container">
        <!-- Barra superior de búsqueda -->
        <header class="feed-header">
            <img src="img/pawzylogo.png" alt="Logo Pawzy" class="feed-logo">
            <input type="text" class="feed-search" placeholder="Buscar">
            <div class="feed-user">
                <span class="user-initial">L</span>
            </div>
        </header>

        <!-- Barra lateral con favicons -->
        <aside class="feed-sidebar">
            <button class="sidebar-button"><img src="img/homeç.png" alt="Inicio"></button>
            <button class="sidebar-button"><img src="img/compass.png" alt="Explorar"></button>
            <button class="sidebar-button"><img src="img/file-upload.png" alt="Añadir"></button>
        </aside>

        <!-- Contenedor de imágenes estilo Pinterest -->
        <main class="feed-main">
            <div id="feed-grid" class="feed-grid">
                <!-- 📌 Imágenes locales -->
                <img src="img/1.jpg" class="feed-item">
                <img src="img/bird1.jpg" class="feed-item">
                <img src="img/bunny.jpg" class="feed-item">
                <img src="img/3.jpg" class="feed-item">
                <img src="img/cat-1.jpg" class="feed-item">
                <img src="img/4.jpg" class="feed-item">
                <img src="img/cat2.jpg" class="feed-item">
                <img src="img/5.jpg" class="feed-item">
                <img src="img/dog2.jpg" class="feed-item">
                <img src="img/dog3.jpg" class="feed-item">
                <img src="img/6.jpg" class="feed-item">
                <img src="img/fox.jpg" class="feed-item">
                <img src="img/7.jpg" class="feed-item">
                <img src="img/8.jpg" class="feed-item">
                <img src="img/hamsterpose2.jpg" class="feed-item">
                <img src="img/hamsterpose3.jpg" class="feed-item">
                <img src="img/nutria.jpg" class="feed-item">
                <img src="img/9.jpg" class="feed-item">

                <!-- 📌 Imágenes de la API de mascotas (se cargarán con JS) -->
            </div>
        </main>
    </div>
    
    <script src="js/feed.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
