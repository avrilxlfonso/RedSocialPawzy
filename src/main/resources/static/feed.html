<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawzy - Feed</title>
    <link rel="stylesheet" href="css/feed.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="icon" type="image/png" href="img/pawzylogo.png">
</head>
<body class="feed-body">
<div class="feed-container">
    <!-- Barra superior de búsqueda -->
    <header class="feed-header">
        <input type="text" class="feed-search" placeholder="Buscar">
        <div class="feed-user" onclick="goToProfile()">
            <span class="user-initial">L</span>
        </div>
    </header>

    <!-- Barra lateral con favicons -->
    <aside class="feed-sidebar">
        <img src="img/pawzylogo.png" alt="Logo Pawzy" class="feed-logo">
        <button class="sidebar-button"><img src="img/home.png" alt="Inicio"></button>
        <button class="sidebar-button"><img src="img/compass.png" alt="Explorar"></button>
        <button class="sidebar-button"><img src="img/file-upload.png" alt="Añadir"></button>
    </aside>

    <!-- Contenedor de imágenes estilo Pinterest -->
    <main class="feed-main">
        <div id="feed-grid" class="feed-grid">
            <!-- 📌 Imágenes de API se cargarán dinámicamente aquí -->
        </div>
    </main>

    <!-- Modal de imagen -->
    <div id="imageModal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-button">&times;</button>
            <div class="modal-body">
                <!-- Imagen -->
                <img id="modalImage" src="" alt="Imagen seleccionada">

                <!-- Información y Comentarios -->
                <div class="modal-info">
                    <!-- Sección de me gusta -->
                    <div class="like-container">
                        <img id="likeIcon" src="img/heart-empty.png" alt="Me gusta" class="like-icon">
                        <span id="likeCount">0</span>
                    </div>

                    <!-- Sección de comentarios -->
                    <div class="comments-section">
                        <h3>Comentarios</h3>
                        <div id="commentSection"></div>
                        <input type="text" id="commentInput" placeholder="Añadir un comentario...">
                        <button id="addCommentButton">Comentar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="js/feed.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
