<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Pawzy</title>
  <link rel="stylesheet" href="css/register.css">
</head>
<body>

  <header class="header d-flex justify-content-between align-items-center">
    <div class="logo d-flex align-items-center">
        <img src="img/animals.png" alt="Logo" class="logo-img">
        <img src="img/letraLogo.png" alt="Logo" class="logo-img">
    </div>
    <nav class="nav">
        <button class="menu-toggle d-md-none" onclick="toggleMenu()">☰</button>
        <div class="desktop-nav d-none d-md-flex">
            <a href="login.html" class="nav-button nav-button--outline">Iniciar Sesión</a>
        </div>
    </nav>
  </header>

  <div class="register-container">
    <h2>Registro</h2>
    <form id="registerForm">
      <label>Nombre de Usuario</label>
      <input type="text" id="username" placeholder="Tu nombre de usuario" required>

      <label>Correo Electrónico</label>
      <input type="email" id="email" placeholder="Tu correo" required>

      <label>Contraseña</label>
      <input type="password" id="password" placeholder="Tu contraseña" required>

      <button type="submit">Registrarse</button>
    </form>
    <p id="message"></p>
    <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
  </div>

  <script src="js/register.js"></script>
  <script>
    function toggleMenu() {
      const menu = document.querySelector('.menu');
      menu.classList.toggle('show');
    }
  </script>
</body>
</html>
