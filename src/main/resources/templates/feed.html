<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pawzy - Feed</title>
  <link rel="stylesheet" href="/css/feed.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="icon" href="/img/pawzylogo.png" type="image/png">
</head>
<body class="feed-body">
<div class="feed-container">

  <!-- 🔹 Barra superior de búsqueda -->
  <header class="feed-header">
    <input type="text" class="feed-search" placeholder="Buscar">
    <div class="feed-user">
      <span class="user-initial" th:text="${user.username[0]}">U</span>
    </div>
  </header>

  <!-- 🔹 Barra lateral con favicons -->
  <aside class="feed-sidebar">
    <img src="/img/pawzylogo.png" alt="Logo Pawzy" class="feed-logo">
    <a th:href="@{/feed}" class="sidebar-button"><img src="/img/home.png" alt="Inicio"></a>
    <a th:href="@{/explore}" class="sidebar-button"><img src="/img/compass.png" alt="Explorar"></a>
    <a th:href="@{/profile}" class="sidebar-button"><img src="/img/file-upload.png" alt="Perfil"></a>
  </aside>

  <!-- 🔹 Contenedor de imágenes -->
  <main class="feed-main">
    <div id="feed-grid" class="feed-grid">
      <!-- 🔹 Cargar imágenes dinámicamente -->
      <div th:each="post : ${posts}" class="feed-item">
        <img th:src="${post.imageUrl}" th:alt="${post.description}" onclick="openModal(this.src)">
      </div>
    </div>
  </main>

  <!-- 🔹 Modal de imagen -->
  <div id="imageModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <button class="close-button" onclick="closeModal()">&times;</button>
      <div class="modal-body">
        <!-- 🔹 Imagen grande -->
        <img id="modalImage" src="" alt="Imagen seleccionada">

        <!-- 🔹 Información y Comentarios -->
        <div class="modal-info">
          <div class="like-container">
            <img id="likeIcon" src="/img/heart-empty.png" alt="Me gusta" class="like-icon">
            <span id="likeCount">0</span>
          </div>

          <div class="comments-section">
            <h3>Comentarios</h3>
            <div id="commentSection"></div>
          </div>
          <input type="text" id="commentInput" placeholder="Añadir un comentario...">
          <button id="addCommentButton">Comentar</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  function openModal(src) {
    document.getElementById("modalImage").src = src;
    document.getElementById("imageModal").style.display = "flex";
  }

  function closeModal() {
    document.getElementById("imageModal").style.display = "none";
  }
</script>

</body>
</html>
