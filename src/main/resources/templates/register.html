<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Registro</title>
  <link rel="stylesheet" href="/css/register.css">
</head>
<body>

  <!-- Navbar -->
  <header class="header">
    <div class="logo">
      <img src="/img/animals.png" alt="Logo" class="logo-img">
      <img src="/img/letraLogo.png" alt="Logo" class="logo-img">
    </div>
    <nav class="nav">
      <button class="menu-toggle d-md-none" onclick="toggleMenu()">☰</button>
      <div class="desktop-nav d-none d-md-flex">
        <a href="/auth/login" class="nav-button nav-button--outline">Iniciar Sesión</a>
      </div>
    </nav>
  </header>

  <!-- Contenedor principal -->
  <div class="register-container">
    <h2>Registro</h2>

    <!-- Mensaje de error -->
    <div th:if="${error}" class="error">
      <p th:text="${error}"></p>
    </div>

    <!-- Formulario de registro -->
    <form th:action="@{/auth/register}" method="post" th:object="${authRequest}">
      <label for="username">Usuario:</label>
      <input type="text" id="username" name="username" th:field="*{username}" required>

      <label for="email">Correo electrónico:</label>
      <input type="email" id="email" name="email" th:field="*{email}" required>

      <label for="password">Contraseña:</label>
      <input type="password" id="password" name="password" th:field="*{password}" required>

      <button type="submit">Registrarse</button>
    </form>

    <!-- Enlace a la página de login -->
    <p>¿Ya tienes una cuenta? <a th:href="@{/login}">Inicia sesión aquí</a></p>
  </div>

  <script>
    function toggleMenu() {
        const menu = document.querySelector('.menu');
        menu.classList.toggle('show');
    }
  </script>

</body>
</html>
