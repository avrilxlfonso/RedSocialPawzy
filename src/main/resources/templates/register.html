<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil - Pawzy</title>
  <link rel="stylesheet" href="/css/profile.css">
</head>
<body>

<div class="profile-container">
  <!-- 🔹 ENCABEZADO DEL PERFIL -->
  <header class="profile-header">
    <img id="userAvatar" th:src="${user.profileImage != null ? user.profileImage : '/img/default-avatar.png'}" alt="Avatar">
    <h1 th:text="${user.username}">Usuario</h1>
    <p th:text="${user.email}">Correo electrónico</p>
    <a th:href="@{/auth/logout}">
      <button>Cerrar Sesión</button>
    </a>
  </header>

  <!-- 🔹 SECCIÓN PARA SUBIR PUBLICACIONES -->
  <section class="upload-section">
    <form th:action="@{/posts/create}" method="post" enctype="multipart/form-data">
      <div class="upload-box">
        <label for="fileInput">
          <i class="fas fa-upload"></i>
          <p>Elige un archivo o arrástralo aquí</p>
        </label>
        <input type="file" name="image" id="fileInput" required>
      </div>

      <div class="description-container">
        <h3>Título</h3>
        <input type="text" name="title" id="titleInput" placeholder="Añade un título" required>

        <h3>Descripción</h3>
        <textarea name="description" id="descriptionInput" placeholder="Añade una descripción detallada" required></textarea>

        <button type="submit">Publicar</button>
      </div>
    </form>
  </section>

  <!-- 🔹 SECCIÓN DE PUBLICACIONES DEL USUARIO -->
  <section class="posts-section">
    <h2>Mis Publicaciones</h2>

    <div id="userPosts" class="post-gallery">
      <div th:each="post : ${userPosts}" class="post-item">
        <img th:src="${post.imageUrl}" alt="Publicación">
        <p th:text="${post.description}"></p>
      </div>

      <!-- 🔹 Mostrar mensaje si el usuario no tiene publicaciones -->
      <p th:if="${#lists.isEmpty(userPosts)}">No tienes publicaciones aún.</p>
    </div>
  </section>
</div>

</body>
</html>
